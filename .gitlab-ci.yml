stages:
  - deploy

variables:
  DEPLOY_BRANCH: "main"
  DEPLOY_PORT: "22"

.deploy_base:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client bash git
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -p ${DEPLOY_PORT:-22} -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -p ${DEPLOY_PORT:-22} "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
      set -euo pipefail
      cd "${DEPLOY_PATH}"
      git fetch --prune
      git checkout "${DEPLOY_BRANCH}"
      git pull origin "${DEPLOY_BRANCH}"
      ./scripts/deploy_remote.sh
      EOF
  environment:
    name: production
    url: "https://${PRODUCTION_DOMAIN:-$DEPLOY_HOST}"

production:
  extends: .deploy_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
