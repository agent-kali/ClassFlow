name: Deploy to production VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests and compile check
        run: |
          pytest || echo "No tests configured yet"
          python -m compileall .

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run remote deploy script
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${DEPLOY_HOST}" ] || [ -z "${DEPLOY_USER}" ] || [ -z "${DEPLOY_PATH}" ] || [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "Missing required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, SSH_PRIVATE_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${DEPLOY_PORT:-22}"
          BRANCH="${DEPLOY_BRANCH:-main}"

          ssh-keyscan -p "${PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

          ssh -p "${PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail; cd \"${DEPLOY_PATH}\"; git fetch --prune; git checkout \"${BRANCH}\"; git pull origin \"${BRANCH}\"; ./scripts/deploy_remote.sh"

      - name: Deployment summary
        run: |
          echo "Deployment completed."
          if [ -n "${{ secrets.PRODUCTION_DOMAIN }}" ]; then
            echo "Production URL: https://${{ secrets.PRODUCTION_DOMAIN }}"
          fi
